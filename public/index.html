<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Colony Mainframe</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main>
      <h1>Colony Mainframe</h1>
      <section class="panel">
        <div class="row">
          <a href="/rules">Rules and Setup</a>
          <a href="/printables/roles" target="_blank">Printable Role / Program Sheet</a>
          <a href="/printables/cards" target="_blank">Reusable Card Set</a>
        </div>
      </section>
      <div class="grid two">
        <section class="panel">
          <h2>Create Session</h2>
          <label>Session Name <input id="name" value="Colony Session" /></label>
          <label>Player Count <input id="playerCount" type="number" min="6" max="16" value="8" /></label>
          <label><input id="includeBootstrap" type="checkbox" checked /> Include Bootstrap role</label>
          <button id="create">Create Session</button>
          <p id="status" class="small"></p>
        </section>
        <section class="panel">
          <h2>Existing Sessions</h2>
          <div id="sessions"></div>
        </section>
      </div>
    </main>
    <script src="/app.js"></script>
    <script>
      const { api, html, text } = window.ColonyApp;
      async function load() {
        const sessions = await api("/api/sessions");
        html(document.getElementById("sessions"), sessions.map((session) => `
          <div class="panel">
            <strong>${session.name}</strong>
            <div class="small">${session.id}</div>
            <div class="small">Player registration: /player/${session.id}</div>
            <div class="row">
              <a href="/admin/${session.id}">Admin</a>
              <a href="/kiosk/${session.id}">Kiosk</a>
              <a href="/player/${session.id}">Player Registration</a>
              <a href="/api/sessions/${session.id}/printables" target="_blank">Printables</a>
              <a href="/rules">Rules</a>
            </div>
          </div>
        `).join("") || "<p class='small'>No sessions yet.</p>");
      }
      document.getElementById("create").onclick = async () => {
        try {
          const created = await api("/api/sessions", {
            method: "POST",
            body: JSON.stringify({
              name: document.getElementById("name").value,
              playerCount: Number(document.getElementById("playerCount").value),
              includeBootstrap: document.getElementById("includeBootstrap").checked
            })
          });
          html(document.getElementById("status"), `
            Created <strong>${created.session.name}</strong>.<br />
            <a href="/admin/${created.session.id}">Open admin</a> |
            <a href="/kiosk/${created.session.id}">Open kiosk</a> |
            <a href="/player/${created.session.id}">Open player registration</a>
          `);
          load();
        } catch (error) {
          text(document.getElementById("status"), error.message);
        }
      };
      load();
    </script>
  </body>
  </html>
